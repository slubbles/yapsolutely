services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: yapsolutely
      POSTGRES_PASSWORD: yapsolutely_dev
      POSTGRES_DB: yapsolutely
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
